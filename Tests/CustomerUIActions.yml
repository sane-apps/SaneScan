---
version: 1
app: SaneScan
require_product_quality_checklist: true
product_quality_checklist:
- id: problem-fit-01
  category: product_fit
  question: Does the first screen make it obvious that SaneScan scans documents into private searchable PDFs?
  surfaces: [Website hero, App Store first screenshots, Empty library]
  required_evidence_types: [screenshot, copy]
- id: problem-fit-02
  category: product_fit
  question: Is the promised job concrete enough that a new user knows when to use SaneScan instead of Files, Notes, or Adobe Scan?
  surfaces: [Website, App Store description, Empty library]
  required_evidence_types: [copy, competitive_context]
- id: first-run-01
  category: first_run
  question: Can a first-time user start scanning or importing without reading instructions or entering unnecessary data?
  surfaces: [Empty library, Scan action, Import action]
  required_evidence_types: [runtime, screenshot]
- id: first-run-02
  category: first_run
  question: Does the empty state show primary actions in a clear visual hierarchy with no dead or disabled-looking controls?
  surfaces: [Empty library]
  required_evidence_types: [screenshot]
- id: core-scan-01
  category: core_workflow
  question: Does tapping Scan open the real VisionKit scanner or clearly explain the hardware/simulator limitation?
  surfaces: [Scan action, Document scanner]
  required_evidence_types: [runtime, log]
- id: core-import-01
  category: core_workflow
  question: Does tapping Import open the native Photos picker without asking for broader permissions than needed?
  surfaces: [Import action, Photos picker]
  required_evidence_types: [runtime, screenshot]
- id: core-library-01
  category: core_workflow
  question: Are saved documents easy to identify by title, thumbnail, page count, and date without visual clutter?
  surfaces: [Document library]
  required_evidence_types: [screenshot, fixture]
- id: core-detail-01
  category: core_workflow
  question: Does the detail view show a real document image and recognized OCR text without distortion, clipping, or placeholder bars?
  surfaces: [Document detail]
  required_evidence_types: [screenshot, fixture]
- id: core-export-01
  category: core_workflow
  question: Does Export create a PDF and reach the native share sheet in a customer-completable path?
  surfaces: [Document detail, Share sheet]
  required_evidence_types: [runtime, actual_output]
- id: core-quota-01
  category: core_workflow
  question: Are Basic limits and Pro gates clear before the user hits a quota wall?
  surfaces: [Library, Paywall, Pro gate]
  required_evidence_types: [copy, test]
- id: visual-proof-01
  category: visual_evidence
  question: Does every marketing/App Store screenshot show the real app working, not artificial UI, blank panels, placeholder content, or static mockups?
  surfaces: [App Store screenshots, Website screenshots]
  required_evidence_types: [screenshot, source_capture]
- id: visual-proof-02
  category: visual_evidence
  question: Is every screenshot cleanly cropped with no simulator artifacts, clipped controls, helper windows, permission prompts, or unreadable text?
  surfaces: [App Store screenshots, Website screenshots]
  required_evidence_types: [screenshot, visual_review]
- id: visual-proof-03
  category: visual_evidence
  question: Do iPad screenshots show native iPad compositions rather than stretched iPhone layouts?
  surfaces: [iPad App Store screenshots]
  required_evidence_types: [screenshot, visual_review]
- id: visual-proof-04
  category: visual_evidence
  question: Does the first App Store screenshot communicate the main customer job before decorative branding?
  surfaces: [App Store first screenshot]
  required_evidence_types: [screenshot, copy]
- id: marketing-01
  category: marketing_parity
  question: Does website copy avoid claims not backed by current app behavior, screenshots, tests, or App Store metadata?
  surfaces: [Website, App Store description]
  required_evidence_types: [copy, source_guard]
- id: marketing-02
  category: marketing_parity
  question: Are screenshot captions and alt text specific enough to describe the visible working state accurately?
  surfaces: [Website images, App Store screenshot storyboard]
  required_evidence_types: [copy, screenshot]
- id: marketing-03
  category: marketing_parity
  question: Is the public CTA aligned with the actual live App Store state and not still saying coming soon after READY_FOR_SALE?
  surfaces: [Website CTA, App Store URL]
  required_evidence_types: [api_response, url_check]
- id: monetization-01
  category: monetization
  question: Does the paywall show the real subscription period, price, renewal behavior, cancellation path, and value proposition before purchase?
  surfaces: [Paywall]
  required_evidence_types: [screenshot, StoreKit]
- id: monetization-02
  category: monetization
  question: Are Terms, Privacy, and Restore Purchases visible and functional inside the paywall flow?
  surfaces: [Paywall]
  required_evidence_types: [runtime, link_check]
- id: monetization-03
  category: monetization
  question: Can a sandbox purchase or purchase-failure path be completed without trapping the user in loading or unavailable state?
  surfaces: [Paywall, StoreKit]
  required_evidence_types: [sandbox_purchase, runtime]
- id: accessibility-01
  category: accessibility
  question: Are primary controls labeled for VoiceOver and reachable in a sensible order?
  surfaces: [Empty library, Detail, Paywall]
  required_evidence_types: [accessibility_snapshot]
- id: accessibility-02
  category: accessibility
  question: Does the interface remain usable with larger Dynamic Type or accessibility text sizes?
  surfaces: [Empty library, Detail, Paywall]
  required_evidence_types: [screenshot, accessibility_snapshot]
- id: accessibility-03
  category: accessibility
  question: Is contrast high enough in dark mode, with no low-opacity gray text on dark backgrounds?
  surfaces: [All customer-facing app screens]
  required_evidence_types: [screenshot, static_scan]
- id: privacy-01
  category: privacy_trust
  question: Are local-first/privacy claims consistent with app permissions, privacy policy, App Privacy, and website copy?
  surfaces: [App, Privacy policy, App Store privacy]
  required_evidence_types: [copy, metadata]
- id: privacy-02
  category: privacy_trust
  question: Does the app avoid exposing real personal documents or sensitive sample data in screenshots, fixtures, logs, or marketing?
  surfaces: [Screenshots, Fixtures, Logs]
  required_evidence_types: [screenshot, fixture, log]
- id: recovery-01
  category: error_recovery
  question: If camera, Photos, OCR, export, or StoreKit fails, does the user see a plain-English explanation and next action?
  surfaces: [Scanner, Photos picker, OCR, Export, Paywall]
  required_evidence_types: [runtime, test]
- id: recovery-02
  category: error_recovery
  question: Can users cancel native sheets, back out of detail/paywall, and recover without losing saved scans?
  surfaces: [Native sheets, Detail, Paywall]
  required_evidence_types: [runtime, test]
- id: performance-01
  category: performance
  question: Does the app launch quickly enough and avoid heavy background work before the first scan/import choice?
  surfaces: [Cold launch, Empty library]
  required_evidence_types: [performance_log]
- id: appstore-01
  category: app_store
  question: Is the App Store version state live or submitted exactly as intended, with no pending developer release, rejected IAP, or hidden availability blocker?
  surfaces: [App Store Connect, Public App Store URL]
  required_evidence_types: [api_response, url_check]
- id: appstore-02
  category: app_store
  question: Are screenshots, description, support URL, privacy URL, age rating, category, and IAP metadata internally consistent?
  surfaces: [App Store metadata]
  required_evidence_types: [metadata, screenshot]
- id: funnel-01
  category: funnel
  question: Can analytics distinguish App Store installs, paywall shown, products loaded, purchase tapped, cancelled, failed, completed, and restored?
  surfaces: [Telemetry, Paywall, Purchase flow]
  required_evidence_types: [event_schema, runtime]
actions:
- id: empty-library-scan-import-actions
  title: Empty library scan and import actions are reachable
  surfaces:
  - Empty library
  - System document scanner
  - Photos picker
  steps:
  - Launch a clean install with the reset-library argument.
  - Verify the empty library shows Scan and Import as the primary customer actions.
  - Open the Scan action and verify the system document-scanner path is requested when camera hardware is available.
  - Open the Import action and verify the Photos picker appears.
  assertions:
  - The empty library is readable in dark mode and exposes both primary actions.
  - Scan routes to the VisionKit document scanner instead of a dead button.
  - Import routes to the native Photos picker without requiring full photo-library access up front.
  evidence:
  - Mini iOS simulator screenshot for the empty library.
  - Mini iOS simulator screenshot or receipt for the Photos picker.
  required_proof_level: full_runtime_completion
  required_evidence_types:
  - mini_click
  - screenshot
  - log
  historical_failure_classes:
  - hardware_or_tcc_runtime
  - permission_recovery_dead_end
  - layout_visual_regression
  - activation_noop
  functional_state:
    description: Clean first-run SaneScan install with no saved documents.
    setup_steps:
    - Launch with --sanescan-reset-library.
  user_inputs:
  - Tap Scan.
  - Tap Import.
  expected_outputs:
  - Scan opens or requests the native document-scanner flow.
  - Import opens the native Photos picker.
- id: fixture-library-detail-export-actions
  title: Fixture documents open, OCR is visible, and PDF export reaches the share sheet
  surfaces:
  - Fixture library
  - Document detail
  - Share sheet
  steps:
  - Launch with fixture documents enabled.
  - Open Contract Packet.
  - Verify the scanned page image, recognized text, and export action are visible.
  - Tap Export and verify the native share sheet appears.
  assertions:
  - Realistic sample documents are present and not placeholder bars.
  - Detail view shows the selected document content without distortion or clipping.
  - Export reaches the native share sheet with a generated PDF.
  evidence:
  - Mini iOS simulator screenshots for library, detail, and share sheet.
  - Test log proving the fixture document did not consume public scan quota.
  required_proof_level: full_runtime_completion
  required_evidence_types:
  - mini_click
  - screenshot
  - fixture
  - log
  historical_failure_classes:
  - data_loss_or_unexpected_mutation
  - layout_visual_regression
  - docs_promise_drift
  - activation_noop
  functional_state:
    description: Seeded local fixture library with contract, receipt, and clinic form documents.
    setup_steps:
    - Launch with --sanescan-reset-library and --sanescan-ui-fixtures.
  user_inputs:
  - Tap Contract Packet.
  - Tap Export.
  expected_outputs:
  - Document detail opens with OCR text.
  - Export opens the native share sheet.
- id: paywall-subscription-disclosure-actions
  title: Paywall subscription purchase flow includes legal links and restore
  surfaces:
  - Upgrade button
  - SaneScan Pro paywall
  steps:
  - Launch with fixture documents and paywall preview enabled.
  - Tap Upgrade.
  - Verify product option copy, subscription details, Terms of Use, Privacy Policy, Restore Purchases, and Done are visible.
  - Verify Terms and Privacy are functional links.
  assertions:
  - The paywall clearly states the auto-renewable yearly subscription period and cancellation path.
  - The purchase flow includes functional Terms of Use and Privacy Policy links inside the app.
  - Restore Purchases remains available without buying.
  evidence:
  - Mini iOS simulator paywall screenshot.
  - UI test assertions for subscription-disclosure, terms-of-use-link, privacy-policy-link, and restore-purchases.
  required_proof_level: full_runtime_completion
  required_evidence_types:
  - mini_click
  - screenshot
  - log
  historical_failure_classes:
  - pro_basic_gate_drift
  - layout_visual_regression
  - docs_promise_drift
  - activation_noop
  functional_state:
    description: Fixture library with paywall preview products enabled.
    setup_steps:
    - Launch with --sanescan-reset-library, --sanescan-ui-fixtures, and --sanescan-paywall-preview.
  user_inputs:
  - Tap Upgrade.
  expected_outputs:
  - Paywall displays subscription details, legal links, restore purchases, and purchase option copy.
- id: app-store-metadata-screenshot-actions
  title: App Store screenshots represent customer-facing iPhone and iPad surfaces
  surfaces:
  - App Store screenshot set
  - Website product imagery
  steps:
  - Generate iPhone and iPad dark-mode screenshot sets from the same customer-facing app states.
  - Inspect every screenshot for stretched documents, distorted logos, status-bar artifacts, clipping, overlap, and unreadable text.
  - Upload the approved screenshot set to App Store Connect.
  assertions:
  - iPhone screenshots show real scan/import/library/detail/paywall surfaces.
  - iPad screenshots are native iPad compositions, not stretched iPhone images.
  - Marketing website screenshots and App Store screenshots use the same approved icon and document-scan brand language.
  evidence:
  - Contact sheet of all submitted iPhone and iPad screenshots.
  - Visual audit receipt paths in outputs.
  required_proof_level: runtime_visual
  required_evidence_types:
  - screenshot
  - fixture
  historical_failure_classes:
  - layout_visual_regression
  - docs_promise_drift
  functional_state:
    description: Current release screenshot bundle in docs/images plus visual-audit receipts.
    setup_steps:
    - Use the standard visual audit screenshot runner on the Mini.
  user_inputs:
  - Review every customer-facing App Store screenshot.
  expected_outputs:
  - Screenshot bundle is visually balanced, clear, dark-mode only, and accurately represents the app.
