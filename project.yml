name: SaneScan
options:
  bundleIdPrefix: com.sanescan
  deploymentTarget:
    iOS: 17.0
  xcodeVersion: 16.0

configs:
  Debug: debug
  Release: release
  Release-AppStore: release

settings:
  DEAD_CODE_STRIPPING: YES
  SWIFT_EMIT_LOC_STRINGS: YES
  ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
  GENERATE_INFOPLIST_FILE: YES
  CLANG_WARN_BOOL_CONVERSION: YES
  CLANG_WARN_CONSTANT_CONVERSION: YES
  CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
  CLANG_WARN_EMPTY_BODY: YES
  CLANG_WARN_ENUM_CONVERSION: YES
  CLANG_WARN_INFINITE_RECURSION: YES
  CLANG_WARN_INT_CONVERSION: YES
  CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
  CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
  CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
  CLANG_WARN_STRICT_PROTOTYPES: YES
  GCC_WARN_64_TO_32_BIT_CONVERSION: YES
  GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
  GCC_WARN_UNDECLARED_SELECTOR: YES
  SWIFT_STRICT_CONCURRENCY: minimal

schemes:
  SaneScan:
    build:
      targets:
        SaneScan: all
        SaneScanTests: [test]
    test:
      targets:
        - SaneScanTests
        - SaneScanUITests
    profile:
      config: Release
    run:
      config: Debug
    archive:
      config: Release-AppStore

targets:
  SaneScan:
    type: application
    platform: iOS
    bundleId: com.sanescan.app
    deploymentTarget:
      iOS: 17.0
    sources:
      - path: SaneScan
      - path: Core
      - path: iOS
        excludes:
          - Info.plist
          - PrivacyInfo.xcprivacy
          - "*.entitlements"
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: SaneScan
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        AppStoreProductID: com.sanescan.app.pro.annual
        LSApplicationCategoryType: "public.app-category.productivity"
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "SaneScan uses the camera only when you choose to scan a photo or document."
        NSPhotoLibraryUsageDescription: "SaneScan imports photos you choose so it can clean them up, OCR them, and export private copies."
        UIUserInterfaceStyle: Dark
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_NAME: SaneScan
        PRODUCT_BUNDLE_IDENTIFIER: com.sanescan.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "100"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: 6.0
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: M78L6FXD48
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanescan.dev
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanescan.app
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release-AppStore:
          PRODUCT_BUNDLE_IDENTIFIER: com.sanescan.app
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "SaneScan iOS App Store"
          OTHER_SWIFT_FLAGS: "-D APP_STORE"

  SaneScanTests:
    type: bundle.unit-test
    platform: iOS
    bundleId: com.sanescan.appTests
    deploymentTarget:
      iOS: 17.0
    testTarget: SaneScan
    sources:
      - Tests
    dependencies:
      - target: SaneScan
    settings:
      base:
        DEVELOPMENT_TEAM: M78L6FXD48
        CODE_SIGN_STYLE: Automatic
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SaneScan.app/SaneScan"
        BUNDLE_LOADER: "$(BUILT_PRODUCTS_DIR)/SaneScan.app/SaneScan"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"

  SaneScanUITests:
    type: bundle.ui-testing
    platform: iOS
    bundleId: com.sanescan.appUITests
    deploymentTarget:
      iOS: 17.0
    testTarget: SaneScan
    sources:
      - UITests
    dependencies:
      - target: SaneScan
    settings:
      base:
        DEVELOPMENT_TEAM: M78L6FXD48
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
